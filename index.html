<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAIV #3 — Digital Twin — Nervous System</title>
<style>
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.8); opacity: 0; } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeGreen { 0% { background-color: #22c55e30; } 100% { background-color: transparent; } }
  @keyframes gentlePulse { 0%, 100% { box-shadow: 0 0 0 0 #3b82f640; } 70% { box-shadow: 0 0 0 6px #3b82f600; } }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e17; color: #e2e8f0; font-family: 'Segoe UI', -apple-system, sans-serif; min-height: 100vh; }
  .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #1e293b; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
  input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: none; }
  .cmd-btn { padding: 7px 14px; border-radius: 6px; border: 1px solid #3b82f640; background: #1e3a5f; color: #3b82f6; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
  .cmd-btn:hover { background: #3b82f630; border-color: #3b82f6; }
  .cmd-btn-red { border-color: #ef444440; background: #3b1111; color: #ef4444; }
  .cmd-btn-red:hover { background: #ef444425; border-color: #ef4444; }
  .cmd-btn-green { border-color: #22c55e40; background: #0a3d1f; color: #22c55e; }
  .cmd-btn-green:hover { background: #22c55e25; border-color: #22c55e; }
  .cmd-btn-amber { border-color: #f59e0b40; background: #3d2e06; color: #f59e0b; }
  .cmd-btn-amber:hover { background: #f59e0b25; border-color: #f59e0b; }
  .toast { position: fixed; bottom: 24px; right: 24px; max-width: 440px; padding: 14px 20px; border-radius: 10px; font-size: 12px; font-weight: 600; z-index: 100; animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .diagnosis-box { border-radius: 8px; padding: 12px 14px; font-size: 12px; line-height: 1.6; }
  .operator-action { border-radius: 8px; padding: 10px 14px; font-size: 12px; line-height: 1.5; display: flex; gap: 10px; align-items: flex-start; }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const C = {
  bg:"#0a0e17",panel:"#111827",border:"#1e293b",
  accent:"#3b82f6",accentDim:"#1e3a5f",
  green:"#22c55e",greenDim:"#0a3d1f",
  red:"#ef4444",redDim:"#3b1111",
  amber:"#f59e0b",amberDim:"#3d2e06",
  cyan:"#06b6d4",cyanDim:"#0a2d36",
  purple:"#a855f7",purpleDim:"#2a1545",
  text:"#e2e8f0",dim:"#64748b",muted:"#475569",white:"#fff",
};

// ---- SHARED COMPONENTS ----
const Dot = ({status,size=8,pulse=false}) => {
  const color = status==="ok"?C.green:status==="warn"?C.amber:status==="error"?C.red:status==="info"?C.cyan:C.dim;
  return <span style={{position:"relative",display:"inline-flex",alignItems:"center",justifyContent:"center",width:size+8,height:size+8}}>
    {pulse&&status==="ok"&&<span style={{position:"absolute",width:size+6,height:size+6,borderRadius:"50%",backgroundColor:color,opacity:0.3,animation:"pulse 2s ease-in-out infinite"}}/>}
    <span style={{width:size,height:size,borderRadius:"50%",backgroundColor:color,boxShadow:`0 0 ${size}px ${color}40`}}/>
  </span>;
};

const Panel = ({title,bodyPart,icon,status,children,span=1}) => {
  const borderColor = status==="ok"?C.green+"40":status==="warn"?C.amber+"40":status==="error"?C.red+"60":status==="info"?C.cyan+"40":C.border;
  return <div style={{
    backgroundColor:C.panel,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 20px",
    gridColumn:`span ${span}`,display:"flex",flexDirection:"column",gap:10,borderTop:`2px solid ${borderColor}`,
  }}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>{icon}</span>
        <div>
          <span style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,color:C.dim}}>{title}</span>
          {bodyPart&&<span style={{fontSize:10,color:C.muted,marginLeft:8}}>The {bodyPart}</span>}
        </div>
      </div>
      <Dot status={status} pulse/>
    </div>
    {children}
  </div>;
};

const Metric = ({label,value,unit,status,small}) => <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0"}}>
  <span style={{fontSize:small?11:12,color:C.dim}}>{label}</span>
  <div style={{display:"flex",alignItems:"baseline",gap:4}}>
    <span className="mono" style={{fontSize:small?14:18,fontWeight:700,
      color:status==="ok"?C.green:status==="warn"?C.amber:status==="error"?C.red:status==="info"?C.cyan:C.text
    }}>{value}</span>
    {unit&&<span style={{fontSize:10,color:C.dim}}>{unit}</span>}
  </div>
</div>;

const IOPin = ({pin,label,commanded,actual,fault}) => {
  const hasFault = commanded&&!actual;
  return <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",borderRadius:6,
    backgroundColor:hasFault?C.redDim:commanded&&actual?C.greenDim:"transparent",
    border:`1px solid ${hasFault?C.red+"40":"transparent"}`}}>
    <span className="mono" style={{fontSize:10,color:C.muted,width:32}}>P{pin}</span>
    <span style={{fontSize:11,color:C.dim,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</span>
    <div style={{display:"flex",gap:4,alignItems:"center"}}>
      {hasFault&&<span style={{fontSize:9,fontWeight:700,color:C.red,animation:"blink 1s step-end infinite"}}>FAULT</span>}
      {!hasFault&&<>
        <span style={{fontSize:9,color:C.muted}}>CMD</span>
        <span className="mono" style={{width:14,height:14,borderRadius:3,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",
          backgroundColor:commanded?C.green+"20":C.panel,color:commanded?C.green:C.muted,border:`1px solid ${commanded?C.green+"40":C.border}`}}>{commanded?"1":"0"}</span>
        <span style={{fontSize:9,color:C.muted}}>ACT</span>
        <span className="mono" style={{width:14,height:14,borderRadius:3,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",
          backgroundColor:actual?C.green+"20":C.panel,color:actual?C.green:C.muted,border:`1px solid ${actual?C.green+"40":C.border}`}}>{actual?"1":"0"}</span>
      </>}
    </div>
  </div>;
};

const Bar = ({value,max=100,label,unit="%",status}) => {
  const pct = Math.min((value/max)*100,100);
  const color = status==="ok"?C.green:status==="warn"?C.amber:status==="error"?C.red:status==="info"?C.cyan:C.accent;
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
      <span style={{fontSize:11,color:C.dim}}>{label}</span>
      <span className="mono" style={{fontSize:14,fontWeight:700,color}}>{value}{unit}</span>
    </div>
    <div style={{width:"100%",height:6,borderRadius:3,backgroundColor:C.border}}>
      <div style={{width:`${pct}%`,height:"100%",borderRadius:3,backgroundColor:color,boxShadow:`0 0 8px ${color}30`,transition:"width 0.8s ease"}}/>
    </div>
  </div>;
};

const Toast = ({message,type,visible}) => {
  if(!visible) return null;
  const bg = type==="success"?C.greenDim:type==="warning"?C.amberDim:type==="info"?C.cyanDim:type==="error"?C.redDim:C.accentDim;
  const borderC = type==="success"?C.green:type==="warning"?C.amber:type==="info"?C.cyan:type==="error"?C.red:C.accent;
  const color = type==="success"?C.green:type==="warning"?C.amber:type==="info"?C.cyan:type==="error"?C.red:C.accent;
  const icon = type==="success"?"✓":type==="warning"?"⚠":type==="info"?"ℹ":type==="error"?"✗":"↑";
  return <div className="toast" style={{backgroundColor:bg,border:`1px solid ${borderC}40`,color}}>{icon} {message}</div>;
};

// Diagnosis panel — what the twin sees + what the operator does
const DiagnosisPanel = ({diagnosis, operatorAction, remoteFix}) => {
  if(!diagnosis) return null;
  return <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16,animation:"slideIn 0.3s ease"}}>
    <div style={{padding:"16px 20px",backgroundColor:C.panel,borderRadius:12,border:`1px solid ${C.red}30`,borderTop:`2px solid ${C.red}60`}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{fontSize:14}}>🔍</span>
        <span style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:C.red}}>What the Twin Shows Us</span>
      </div>
      <div className="diagnosis-box" style={{backgroundColor:C.redDim,border:`1px solid ${C.red}30`,color:C.text}}>
        <span className="mono" style={{color:C.red,fontWeight:700}}>{diagnosis}</span>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:remoteFix?"1fr 1fr":"1fr",gap:10}}>
      <div style={{padding:"16px 20px",backgroundColor:C.panel,borderRadius:12,border:`1px solid ${C.green}30`,borderTop:`2px solid ${C.green}60`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontSize:14}}>📞</span>
          <span style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:C.green}}>What the Operator Does</span>
        </div>
        <div className="operator-action" style={{backgroundColor:C.greenDim,border:`1px solid ${C.green}30`,color:C.green}}>
          <span style={{fontSize:16,flexShrink:0}}>👷</span>
          <span>{operatorAction}</span>
        </div>
      </div>
      {remoteFix&&<div style={{padding:"16px 20px",backgroundColor:C.panel,borderRadius:12,border:`1px solid ${C.cyan}30`,borderTop:`2px solid ${C.cyan}60`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontSize:14}}>💻</span>
          <span style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:C.cyan}}>What We Do from Louisville</span>
        </div>
        <div className="operator-action" style={{backgroundColor:C.cyanDim,border:`1px solid ${C.cyan}30`,color:C.cyan}}>
          <span style={{fontSize:16,flexShrink:0}}>🖥</span>
          <span>{remoteFix}</span>
        </div>
      </div>}
    </div>
  </div>;
};


// =================== MAIN APP ===================
function App() {
  const [tick,setTick] = useState(0);
  const [scenario,setScenario] = useState("healthy");

  // Toast + log
  const [toast,setToast] = useState({message:"",type:"success",visible:false});
  const toastTimer = useRef(null);
  const [cmdLog,setCmdLog] = useState([]);

  const showToast = (message,type="success") => {
    if(toastTimer.current) clearTimeout(toastTimer.current);
    setToast({message,type,visible:true});
    toastTimer.current = setTimeout(()=>setToast(t=>({...t,visible:false})),5000);
  };
  const addLog = (cmd,type) => {
    const time = new Date().toLocaleTimeString();
    setCmdLog(prev => [{time,cmd,type:type||"info"},...prev].slice(0,15));
  };

  useEffect(()=>{const id=setInterval(()=>setTick(t=>t+1),1500);return()=>clearInterval(id);},[]);
  const j = useCallback((b,r)=>+(b+(Math.random()-0.5)*r).toFixed(1),[]);

  // Scenario effects
  useEffect(()=>{
    setCmdLog([]);
    if(scenario==="healthy") return;
    if(scenario==="wire_fault"){
      addLog("NERVOUS SYSTEM → Pin 14 open circuit detected. Belt FWD commanded ON — no motion sensed.","fault");
      addLog("DIAGNOSIS → Fault isolated to Pin 14 in 25-pin umbilical. Passenger-side bulkhead connector.","diagnosis");
      showToast("Twin detected: Pin 14 open circuit — belt not responding to PLC command","error");
    }
    if(scenario==="apera_crash"){
      addLog("NERVOUS SYSTEM → Apera Server 1 last inference was 12 minutes ago. Process not responding.","fault");
      addLog("DIAGNOSIS → CPU temp normal. Network connected. Software process crashed — not hardware.","diagnosis");
      showToast("Twin detected: Apera Server 1 process not responding — vision offline","error");
    }
    if(scenario==="servo_fault"){
      addLog("NERVOUS SYSTEM → Stäubli servo fault: Axis 3 following error. Arm stopped.","fault");
      addLog("DIAGNOSIS → Schunk controller powered. EtherCAT link healthy. Recoverable software fault — not mechanical.","diagnosis");
      showToast("Twin detected: Stäubli servo fault on Axis 3 — recoverable","error");
    }
    if(scenario==="router_freeze"){
      addLog("NERVOUS SYSTEM → Stride Linx unresponsive. 6 consecutive pings failed. VPN down.","fault");
      addLog("NERVOUS SYSTEM → Twin still alive on independent cellular backhaul. Reporting through backup.","info");
      showToast("Twin detected: Router frozen — reporting via independent cellular connection","error");
    }
    if(scenario==="gripper_stuck"){
      addLog("NERVOUS SYSTEM → Gripper command OFF but part still detected on sensor.","fault");
      addLog("DIAGNOSIS → Schunk controller healthy. Magnetic gripper — likely residual magnetism, not software.","diagnosis");
      showToast("Twin detected: Gripper won't release — residual magnetism suspected","warning");
    }
    if(scenario==="apera_drift"){
      addLog("NERVOUS SYSTEM → Apera pick confidence dropped from 95% to 62% over last shift.","warn");
      addLog("DIAGNOSIS → Cameras connected. Servers running. Camera 2 auto-adjusted exposure — ambient light change.","diagnosis");
      showToast("Twin detected: Vision accuracy degrading — likely lighting change on site","warning");
    }
  },[scenario]);

  // Derived states per scenario
  const isHealthy = scenario==="healthy";
  const isWireFault = scenario==="wire_fault";
  const isAperaCrash = scenario==="apera_crash";
  const isServoFault = scenario==="servo_fault";
  const isRouterFreeze = scenario==="router_freeze";
  const isGripperStuck = scenario==="gripper_stuck";
  const isAperaDrift = scenario==="apera_drift";

  const overallStatus = isHealthy?"ok":"error";

  // Diagnosis content per scenario
  const diagnosisMap = {
    wire_fault: {
      diagnosis: "Belt Motor: commanded ON. Belt Motion: none. Fault isolated to Pin 14 — open circuit.",
      operatorAction: "\"Tighten Pin 14 on the passenger-side bulkhead connector.\" Fixed in 5 minutes.",
      remoteFix: null,
    },
    apera_crash: {
      diagnosis: "Apera Server 1: last inference 12 minutes ago. CPU temp: normal. Network: connected. Status: process not responding.",
      operatorAction: "\"Open the cab, press the power button on the left Dell server for 3 seconds.\" Back online in 2 minutes.",
      remoteFix: "Restart the Apera service remotely through the twin's SSH tunnel. If remote restart fails, guide the operator.",
    },
    servo_fault: {
      diagnosis: "Stäubli servo fault: Axis 3 — following error. EtherCAT link: healthy. Schunk controller: powered.",
      operatorAction: "If mechanical: operator describes the issue or swaps the part with our guidance. We know exactly what's wrong.",
      remoteFix: "Clear the recoverable fault remotely and re-home the arm. No drive required.",
    },
    router_freeze: {
      diagnosis: "Stride Linx: unresponsive. Twin still alive on independent cellular backhaul. All other systems still reporting.",
      operatorAction: "\"Flip the labeled switch on the IT rack to reboot the router.\" Back online in 90 seconds.",
      remoteFix: "Press the reset button through the twin's cellular connection. Power-cycle the relay remotely.",
    },
    gripper_stuck: {
      diagnosis: "Gripper command: OFF. Part still detected. Schunk controller healthy. Likely residual magnetism — not a software issue.",
      operatorAction: "Clear the part manually, knowing the system is fine. No time wasted chasing a ghost.",
      remoteFix: null,
    },
    apera_drift: {
      diagnosis: "Apera pick confidence: 62% (normal: 95%). Camera 2 exposure: auto-adjusted to compensate for ambient light change.",
      operatorAction: "Reposition a work light if the cameras show an obvious shadow or glare change.",
      remoteFix: "Pull up the camera feed through the twin and adjust the vision parameters from our laptops. Truck never stops.",
    },
  };

  const currentDiagnosis = diagnosisMap[scenario] || null;

  return <div style={{padding:24,maxWidth:1440,margin:"0 auto"}}>
    <Toast message={toast.message} type={toast.type} visible={toast.visible}/>

    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:40,height:40,borderRadius:10,backgroundColor:C.accent+"15",border:`1px solid ${C.accent}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🚛</div>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:C.white,letterSpacing:-0.5}}>RAIV #3 <span style={{color:C.dim,fontWeight:400,fontSize:15}}>Digital Twin</span></h1>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>Louisville, KY → Field Site &bull; Nervous System: <span style={{color:C.green}}>Online</span> &bull; Last update: {tick%2===0?"just now":"1s ago"}</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <Dot status={overallStatus} size={10} pulse/>
        <span style={{fontSize:13,fontWeight:700,letterSpacing:0.5,
          color:overallStatus==="ok"?C.green:C.red}}>
          {overallStatus==="ok"?"ALL SYSTEMS NOMINAL":"FAULT DETECTED — SEE DIAGNOSIS"}
        </span>
      </div>
    </div>

    {/* The Problem — shown only in healthy state */}
    {isHealthy&&<div style={{
      marginBottom:16,padding:"20px 24px",backgroundColor:C.panel,borderRadius:12,border:`1px solid ${C.border}`,
      display:"flex",gap:24,alignItems:"center",flexWrap:"wrap",
    }}>
      <div style={{flex:1,minWidth:300}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:6}}>The Truck Can't Tell Us Where It Hurts.</div>
        <div style={{fontSize:12,color:C.dim,lineHeight:1.7}}>
          Every time RAIV #3 goes down, somebody drives five hours. They find a loose pin, a frozen router, or a crashed server. They fix it in minutes. Then they drive five hours back. The operator was standing right next to the truck the whole time — they could have fixed it. But nobody could tell them what was wrong.
        </div>
        <div style={{fontSize:12,color:C.muted,marginTop:8,fontStyle:"italic"}}>
          We're not driving because the fix is complicated. We're driving because the diagnosis is impossible from here.
        </div>
      </div>
      <div style={{display:"flex",gap:16}}>
        <div style={{textAlign:"center",padding:"12px 16px",borderRadius:8,backgroundColor:C.redDim,border:`1px solid ${C.red}30`,minWidth:100}}>
          <div className="mono" style={{fontSize:28,fontWeight:800,color:C.red}}>10 hrs</div>
          <div style={{fontSize:10,color:C.dim,marginTop:4}}>Round-trip to diagnose</div>
        </div>
        <div style={{textAlign:"center",padding:"12px 16px",borderRadius:8,backgroundColor:C.greenDim,border:`1px solid ${C.green}30`,minWidth:100}}>
          <div className="mono" style={{fontSize:28,fontWeight:800,color:C.green}}>5 min</div>
          <div style={{fontSize:10,color:C.dim,marginTop:4}}>Typical actual repair</div>
        </div>
        <div style={{textAlign:"center",padding:"12px 16px",borderRadius:8,backgroundColor:C.amberDim,border:`1px solid ${C.amber}30`,minWidth:100}}>
          <div className="mono" style={{fontSize:28,fontWeight:800,color:C.amber}}>2 jobs</div>
          <div style={{fontSize:10,color:C.dim,marginTop:4}}>Lost per trip</div>
        </div>
      </div>
    </div>}

    {/* Scenario buttons */}
    <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap",padding:"10px 14px",backgroundColor:C.panel,borderRadius:10,border:`1px solid ${C.border}`}}>
      <span style={{fontSize:11,color:C.muted,alignSelf:"center",marginRight:6}}>SIMULATE FAILURE:</span>
      {[
        {id:"healthy",label:"All Healthy",e:"✅"},
        {id:"wire_fault",label:"Broken Wire (Pin 14)",e:"🔌"},
        {id:"apera_crash",label:"Apera Server Crash",e:"👁"},
        {id:"servo_fault",label:"Stäubli Servo Fault",e:"🧠"},
        {id:"router_freeze",label:"Router Freeze",e:"📡"},
        {id:"gripper_stuck",label:"Gripper Won't Release",e:"🧲"},
        {id:"apera_drift",label:"Vision Accuracy Drop",e:"📉"},
      ].map(s=>
        <button key={s.id} onClick={()=>{setScenario("healthy");setTimeout(()=>setScenario(s.id),50);}} style={{
          padding:"7px 14px",borderRadius:6,border:`1px solid ${scenario===s.id?(s.id==="healthy"?C.green:C.red):C.border}`,
          backgroundColor:scenario===s.id?(s.id==="healthy"?C.greenDim:C.redDim):"transparent",
          color:scenario===s.id?(s.id==="healthy"?C.green:C.red):C.dim,
          fontSize:11,fontWeight:600,cursor:"pointer",transition:"all 0.2s",
        }}>{s.e} {s.label}</button>
      )}
    </div>

    {/* Diagnosis Panel */}
    {currentDiagnosis&&<DiagnosisPanel
      diagnosis={currentDiagnosis.diagnosis}
      operatorAction={currentDiagnosis.operatorAction}
      remoteFix={currentDiagnosis.remoteFix}
    />}

    {/* Grid — the body of the truck */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>

      {/* STÄUBLI — The Brain */}
      <Panel title="Stäubli Robot Arm" bodyPart="Brain" icon="🧠" status={isServoFault?"error":"ok"}>
        <Metric label="EtherCAT Link" value="HEALTHY" status="ok"/>
        <Metric label="Schunk UXB Controller" value="POWERED" status="ok"/>
        <Metric label="Servo Status" value={isServoFault?"FAULT — AXIS 3":"ALL NOMINAL"} status={isServoFault?"error":"ok"}/>
        {isServoFault&&<div className="diagnosis-box" style={{backgroundColor:C.redDim,border:`1px solid ${C.red}30`,color:C.amber,fontSize:11}}>
          Axis 3: following error (recoverable). EtherCAT healthy, Schunk powered. This is a software fault, not mechanical failure.
        </div>}
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:4}}>
          <div style={{fontSize:10,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Joint Positions (°)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
            {[j(12.3,2),j(-45.7,3),j(88.1,2),j(0.5,1),j(-22.4,2),j(178.9,3)].map((v,i)=><div key={i} style={{textAlign:"center",padding:"4px 0",borderRadius:4,backgroundColor:C.bg,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:9,color:C.muted}}>J{i+1}</div>
              <div className="mono" style={{fontSize:13,fontWeight:700,color:isServoFault&&i===2?C.red:isServoFault?C.dim:C.text}}>{isServoFault&&i===2?"ERR":isServoFault?"—":v.toFixed(1)}</div>
            </div>)}
          </div>
        </div>
        <div style={{fontSize:10,color:C.muted,lineHeight:1.5,fontStyle:"italic",padding:"2px 0"}}>
          Six axes of real-time motion via Schunk UXB over EtherCAT. When it faults, the error code is right here — no drive needed.
        </div>
      </Panel>

      {/* APERA — The Eyes */}
      <Panel title="Apera AI Vision" bodyPart="Eyes" icon="👁" status={isAperaCrash?"error":isAperaDrift?"warn":"ok"}>
        <Metric label="Server 1 (Front Dell)" value={isAperaCrash?"NOT RESPONDING":"RUNNING"} status={isAperaCrash?"error":"ok"}/>
        <Metric label="Server 2 (Rear Dell)" value="RUNNING" status="ok"/>
        <Metric label="Last Inference" value={isAperaCrash?"12 min ago":"< 1 sec"} status={isAperaCrash?"error":"ok"}/>
        {isAperaCrash&&<div className="diagnosis-box" style={{backgroundColor:C.redDim,border:`1px solid ${C.red}30`,color:C.amber,fontSize:11}}>
          Server 1 process crashed. CPU temp normal, network connected. Software issue — power cycle or remote restart will fix it.
        </div>}
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:4}}>
          <Bar label="Pick Confidence" value={isAperaCrash?0:isAperaDrift?j(62,3):j(96.4,2)} unit="%" status={isAperaCrash?"error":isAperaDrift?"warn":"ok"}/>
          <div style={{height:8}}/>
          <Bar label="Vision FPS" value={isAperaCrash?0:j(28,3)} max={30} unit=" fps" status={isAperaCrash?"error":"ok"}/>
        </div>
        {isAperaDrift&&<div className="diagnosis-box" style={{backgroundColor:C.amberDim,border:`1px solid ${C.amber}30`,color:C.amber,fontSize:11}}>
          Confidence dropped from 95% → 62% this shift. Camera 2 exposure auto-adjusted — ambient lighting changed on site.
        </div>}
        <div style={{height:60,borderRadius:6,backgroundColor:C.bg,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:18}}>📷</div><span style={{fontSize:10,color:C.muted}}>Camera Feed — Live</span></div>
        </div>
        <div style={{fontSize:10,color:C.muted,lineHeight:1.5,fontStyle:"italic",padding:"2px 0"}}>
          The AI that makes the truck smart. Sees parts, decides what to pick. If the eyes go down, the brain has nothing to work with.
        </div>
      </Panel>

      {/* PLC — The Spine */}
      <Panel title="Mitsubishi FX5UC PLC" bodyPart="Spine" icon="🦴" status="ok">
        <Metric label="PLC Status" value="RUN" status="ok"/>
        <Metric label="Scan Cycle" value={j(4.2,0.5)} unit="ms" status="ok"/>
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:4}}>
          <div style={{fontSize:10,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Key Digital Outputs</div>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            <IOPin pin="03" label='doBelt[FWD]' commanded={true} actual={!isWireFault}/>
            <IOPin pin="07" label='doGripper_EGM[MAG]' commanded={isGripperStuck?false:false} actual={false}/>
            <IOPin pin="11" label='diServo[Enable]' commanded={true} actual={true}/>
            <IOPin pin="14" label='doConveyor[Enable]' commanded={true} actual={!isWireFault}/>
            <IOPin pin="19" label='doSafetyStop' commanded={false} actual={false}/>
          </div>
        </div>
        <div style={{fontSize:10,color:C.muted,lineHeight:1.5,fontStyle:"italic",padding:"2px 0"}}>
          The central switchboard. Every signal passes through here. The spine sends a signal — the nervous system can feel whether it arrived.
        </div>
      </Panel>

      {/* BELT & GRIPPER — The Muscles */}
      <Panel title="Belt & Gripper" bodyPart="Muscles" icon="💪" status={isWireFault?"error":isGripperStuck?"warn":"ok"}>
        <Bar label="Belt Speed" value={isWireFault?0:j(92,4)} unit="%" status={isWireFault?"error":"ok"}/>
        <Metric label="Belt Current" value={isWireFault?"0.0":j(4.2,0.5)} unit="A" status={isWireFault?"error":"ok"}/>
        <Metric label="Belt Direction" value={isWireFault?"STOPPED":"FORWARD"} status={isWireFault?"error":"ok"}/>
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:4}}>
          <Metric label="Gripper State" value={isGripperStuck?"STUCK — PART DETECTED":"RELEASED"} status={isGripperStuck?"warn":"ok"}/>
          <Metric label="Gripper Command" value={isGripperStuck?"OFF":"OFF"} status={isGripperStuck?"warn":"ok"}/>
          <Metric label="Gripper Cycles Today" value="847" unit=""/>
        </div>
        {isGripperStuck&&<div className="diagnosis-box" style={{backgroundColor:C.amberDim,border:`1px solid ${C.amber}30`,color:C.amber,fontSize:11}}>
          Command says OFF but part sensor says present. Schunk controller healthy. Residual magnetism — not a software bug. Operator clears manually.
        </div>}
        <div style={{fontSize:10,color:C.muted,lineHeight:1.5,fontStyle:"italic",padding:"2px 0"}}>
          The workhorses. Belt carries material; gripper picks and places. Dependent on clean signals through the 25-pin cable from the spine.
        </div>
      </Panel>

      {/* NETWORK */}
      <Panel title="Network & Connectivity" icon="📡" status={isRouterFreeze?"error":"ok"}>
        <Metric label="Stride Linx VPN" value={isRouterFreeze?"UNRESPONSIVE":"CONNECTED"} status={isRouterFreeze?"error":"ok"}/>
        <Metric label="Pi Cellular (Independent)" value="CONNECTED" status="ok"/>
        <Metric label="Netgear Switch" value="ALL PORTS UP" status="ok"/>
        <Metric label="TRENDnet PoE (Rear)" value="ONLINE" status="ok"/>
        {isRouterFreeze&&<div className="diagnosis-box" style={{backgroundColor:C.cyanDim,border:`1px solid ${C.cyan}30`,color:C.cyan,fontSize:11}}>
          Router frozen but the twin is still alive. The Raspberry Pi has its own cellular connection, independent of the Stride Linx. We can still see everything and guide the operator.
        </div>}
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:4}}>
          <Metric label="Latency (VPN)" value={isRouterFreeze?"—":j(34,8)} unit={isRouterFreeze?"":"ms"} status={isRouterFreeze?"error":"ok"} small/>
          <Metric label="Latency (Pi Cellular)" value={j(120,20)} unit="ms" status="ok" small/>
        </div>
      </Panel>

      {/* NERVOUS SYSTEM — The Pi */}
      <Panel title="Nervous System" icon="🧬" status="ok">
        <Metric label="Raspberry Pi" value="ONLINE" status="ok"/>
        <Metric label="Cellular Backhaul" value="CONNECTED" status="ok"/>
        <Metric label="Location" value="IT Rack (Cab)" status="ok"/>
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:4}}>
          <div style={{fontSize:10,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Monitoring</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {[
              {label:"PLC Signal Monitoring",val:"Active",ok:true},
              {label:"Apera Server Health",val:isAperaCrash?"FAULT DETECTED":"Healthy",ok:!isAperaCrash},
              {label:"Schunk/Stäubli Faults",val:isServoFault?"FAULT DETECTED":"None",ok:!isServoFault},
              {label:"Camera Feeds",val:"Streaming",ok:true},
              {label:"Network Devices",val:isRouterFreeze?"Router DOWN":"All Up",ok:!isRouterFreeze},
            ].map((r,i)=><div key={i} style={{
              display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"5px 10px",borderRadius:6,
              backgroundColor:r.ok?C.bg:C.redDim,border:`1px solid ${r.ok?C.border:C.red+"40"}`,
            }}>
              <span style={{fontSize:11,color:r.ok?C.dim:C.red}}>{r.label}</span>
              <span className="mono" style={{fontSize:10,fontWeight:700,color:r.ok?C.green:C.red}}>{r.val}</span>
            </div>)}
          </div>
        </div>
        <div style={{fontSize:10,color:C.muted,lineHeight:1.5,fontStyle:"italic",padding:"2px 0"}}>
          A Raspberry Pi with its own cellular. Sits on the network and listens. If it dies, the truck keeps running — we just lose visibility.
        </div>
      </Panel>
    </div>

    {/* UMBILICAL */}
    <div style={{marginTop:14}}>
      <Panel title="25-Pin Umbilical Health" icon="🔌" status={isWireFault?"error":"ok"}>
        <div style={{display:"flex",gap:20,alignItems:"flex-start",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:240}}>
            <div style={{fontSize:11,color:C.dim,marginBottom:6}}>Cab (ZipLink) → Passenger Side → Rear (Bulkhead)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(13,1fr)",gap:3}}>
              {Array.from({length:25},(_,i)=>{
                const n=i+1;
                const faulted = isWireFault&&n===14;
                return <div key={i} style={{textAlign:"center",padding:"5px 0",borderRadius:4,
                  backgroundColor:faulted?C.redDim:C.bg,
                  border:`1px solid ${faulted?C.red+"60":C.border}`,
                  animation:faulted?"blink 1s step-end infinite":"none",
                }}>
                  <div className="mono" style={{fontSize:12,fontWeight:700,
                    color:faulted?C.red:C.green}}>{n}</div>
                  {faulted&&<div style={{fontSize:7,color:C.red,fontWeight:700}}>OPEN</div>}
                </div>;
              })}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
              <span style={{fontSize:10,color:C.muted}}>
                {isWireFault?"24/25 healthy — 1 open circuit":"25/25 healthy"}
              </span>
              <span style={{fontSize:10,fontWeight:700,
                color:isWireFault?C.red:C.green}}>
                {isWireFault?"PIN 14 — OPEN CIRCUIT":"ALL CLEAR"}
              </span>
            </div>
          </div>
        </div>
      </Panel>
    </div>

    {/* Event Log */}
    <div style={{marginTop:14,padding:"14px 18px",backgroundColor:C.panel,borderRadius:10,border:`1px solid ${C.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>📜</span>
          <span style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:C.dim}}>Nervous System Event Log</span>
        </div>
        <button className="cmd-btn" onClick={()=>setCmdLog([])} style={{padding:"4px 10px",fontSize:10}}>Clear</button>
      </div>
      <div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>
        {cmdLog.length===0&&<div style={{fontSize:11,color:C.muted,fontStyle:"italic",padding:"8px 0"}}>All systems nominal. Select a failure scenario above to see what the nervous system detects and how the digital twin guides the diagnosis.</div>}
        {cmdLog.map((entry,i)=>{
          const color = entry.type==="fault"?C.red:entry.type==="diagnosis"?C.cyan:entry.type==="warn"?C.amber:entry.type==="info"?C.accent:C.dim;
          const icon = entry.type==="fault"?"⚠":entry.type==="diagnosis"?"🔍":entry.type==="warn"?"📉":entry.type==="info"?"ℹ":"•";
          return <div key={i} style={{display:"flex",gap:10,padding:"5px 8px",borderRadius:4,
            backgroundColor:i===0?`${color}10`:"transparent",animation:i===0?"slideIn 0.3s ease":"none"}}>
            <span style={{fontSize:11,flexShrink:0}}>{icon}</span>
            <span className="mono" style={{fontSize:10,color:C.muted,whiteSpace:"nowrap",flexShrink:0}}>{entry.time}</span>
            <span className="mono" style={{fontSize:11,color:i<2?color:C.dim}}>{entry.cmd}</span>
          </div>;
        })}
      </div>
    </div>

    {/* Footer */}
    <div style={{marginTop:14,padding:"12px 16px",backgroundColor:C.panel,borderRadius:10,border:`1px solid ${C.border}`,
      display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
      <div style={{fontSize:11,color:C.muted}}>B&B Enterprises &bull; RAIV #3 Digital Twin &bull; Nervous System Dashboard</div>
      <div style={{display:"flex",gap:16}}>
        <span style={{fontSize:11,color:C.green}}>🧬 Nervous System: Online</span>
        <span style={{fontSize:11,color:C.green}}>📡 Cellular Backhaul: Connected</span>
        <span style={{fontSize:11,color:C.muted}}>🔧 Prototype — Bench Demo</span>
      </div>
    </div>

    {/* The Ask */}
    {isHealthy&&<div style={{
      marginTop:14,padding:"20px 24px",backgroundColor:C.panel,borderRadius:12,border:`1px solid ${C.accent}30`,borderTop:`2px solid ${C.accent}40`,
    }}>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:8}}>The Ask</div>
      <div style={{fontSize:12,color:C.dim,lineHeight:1.7}}>
        Two weeks of bench time and $250 in parts. A Raspberry Pi mounted in the cab's IT rack with its own cellular connection. It reads signals from the PLC, monitors the Apera servers, watches for Stäubli fault codes through the Schunk controller, and tracks every camera feed and network device. It doesn't modify anything. It sits on the network and listens.
      </div>
      <div style={{fontSize:12,color:C.dim,lineHeight:1.7,marginTop:8}}>
        If it works, the next time RAIV #3 goes down — nobody drives. We check the twin, call the operator, and tell them exactly where it hurts.
      </div>
      <div style={{fontSize:13,fontWeight:700,color:C.accent,marginTop:12,fontStyle:"italic"}}>
        The Stäubli can move. The Apera can see. The PLC can route. But when something breaks, the truck goes silent. Build the nervous system. Give it a voice.
      </div>
    </div>}
  </div>;
}

ReactDOM.render(<App/>, document.getElementById("app"));
</script>
</body>
</html>
